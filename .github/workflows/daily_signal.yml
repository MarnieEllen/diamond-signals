name: DIAMOND Daily Signal

on:
  schedule:
    - cron: '35 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy pytz

      - name: Generate today's DIAMOND signal
        run: python auto_signal.py

      - name: Commit and push updated site
        run: |
          git config user.name "DIAMOND Bot"
          git config user.email "diamond-bot@users.noreply.github.com"
          git add index.html market_history.json
          git diff --staged --quiet || git commit -m "Daily signal: $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push
